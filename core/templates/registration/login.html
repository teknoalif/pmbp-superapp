<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PMBP Superapp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0056b3 0%, #00aaff 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center;
        }
        .login-card img { height: 80px; margin-bottom: 20px; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #ddd; }
        .btn-login {
            background: #0056b3; color: white; border: none; padding: 12px;
            border-radius: 10px; font-weight: 600; width: 100%; transition: 0.3s;
        }
        .btn-login:hover { background: #004494; transform: translateY(-2px); }
        .footer-text { font-size: 0.8rem; color: #888; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="login-card">
        {% load static %}
        <img src="{% static 'img/logo.png' %}" alt="Logo Al Binaa">
        <h4 class="fw-bold mb-1">PMBP Superapp</h4><div id="txtMasehi" class="small text-muted mb-1"></div><div id="txtHijriah" class="small text-primary fw-bold mb-3"></div>
        {% if form.errors %}
            <div class="alert alert-danger p-2 small">Username atau password salah.</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Username Anda" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="********" required>
            </div>
            <button type="submit" class="btn-login shadow-sm">Masuk Sekarang</button>
        </form>
        <p class="footer-text">© 2026 PMBP Al Binaa <br> <span class="text-primary fw-bold">Created by Kak Alif</span></p>
    </div>
    <div class="card border-0 shadow-sm mb-4" style="background: #fff; border-left: 5px solid #00aaff !important;">
        <div class="card-body d-flex justify-content-between align-items-center py-2">
            <div>
                <span id="txtMasehi" class="fw-bold text-dark small"></span> | 
                <span id="txtHijriah" class="text-primary small fw-bold"></span>
            </div>
            <div id="txtJam" class="fw-bold text-primary" style="font-family: monospace; font-size: 1.2rem;"></div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const jamHeader = now.getHours();
            
            // Format jam digital pakai titik (.) sesuai request ta'
            const jamDigital = now.toLocaleTimeString('id-ID', { hour12: false }).replace(/:/g, '.');

            // Logika mengubah "Minggu" jadi "Ahad"
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            const masehiRaw = now.toLocaleDateString('id-ID', options);
            const masehiStr = masehiRaw.replace('Minggu', 'Ahad');
            
            // Logika Hitung Manual Tanggal Hijriah (Patokan 29 Maret 2026 = 9 Syawal 1447 H)
            const patokan = new Date('2026-03-29').setHours(0,0,0,0);
            const hariIni = new Date(now).setHours(0,0,0,0);
            const diff = Math.floor((hariIni - patokan) / 86400000);
            const offsetMaghrib = jamHeader >= 18 ? 1 : 0; // Ganti hari setelah Maghrib
            const hijriahStr = (9 + diff + offsetMaghrib) + " Syawal 1447 H";
            
            document.getElementById('txtMasehi').innerText = masehiStr;
            document.getElementById('txtHijriah').innerText = hijriahStr;
            document.getElementById('txtJam').innerText = jamDigital;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script></body>
</html>
