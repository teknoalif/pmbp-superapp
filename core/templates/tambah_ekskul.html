<!DOCTYPE html>
<html>
<head>
    <title>Tambah Ekskul Baru</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">

                <a href="/dashboard/" class="btn btn-sm btn-outline-secondary mb-3">← Kembali ke Dashboard</a>

                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        <h4 class="card-title mb-4 text-center">Input Ekskul/SC Baru</h4>
                        <hr>

                        <form method="POST">
                            {% csrf_token %}

                            <div class="mb-3">
                                {{ form.as_p }}
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-success">Simpan Ekskul</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <small class="text-muted">Divisi PMBP Al Binaa - Kak Alif Mode Admin</small>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
